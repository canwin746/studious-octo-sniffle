version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tdp-postgres
    environment:
      POSTGRES_PASSWORD: tdp_password
      POSTGRES_DB: teacher_profile
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: tdp-api
    environment:
      - DATABASE_URL=postgresql://postgres:tdp_password@postgres:5432/teacher_profile?schema=public
      - JWT_SECRET=teacher_digital_profile_jwt_secret_key_must_be_at_least_32_characters
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: tdp-web
    environment:
      - VITE_API_URL=http://api:3001/api   # 容器内访问 API，用服务名
   # ports:
    #  - "80:80"   # 改成 80，方便域名直接访问
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
